<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lecture 07–08 Python Practice Quiz · 20 Minutes</title>
<style>
  :root {
    --bg:        #F5EFE0;
    --bg-soft:   #EDE4D0;
    --card:      #FBF7EC;
    --ink:       #2E3A3A;
    --muted:     #6B7775;
    --accent:    #5B8A8A;
    --accent-d:  #406A6A;
    --good:      #7BA77B;
    --good-bg:   #DFEBDC;
    --bad:       #B8746B;
    --bad-bg:    #EFD9D3;
    --hi:        #E8C97A;
    --line:      #d8cfba;
    --shadow:    0 2px 0 rgba(46,58,58,0.08), 0 6px 18px rgba(46,58,58,0.06);
    --radius:    14px;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height:1.55; min-height:100vh; display:flex; justify-content:center;
    padding:24px 14px 60px;
  }
  .wrap { width:100%; max-width:860px; }
  header { text-align:center; margin-bottom:18px; }
  header h1 { font-size:1.45rem; margin:0 0 4px; color:var(--accent-d); letter-spacing:.3px; }
  header p { margin:0; color:var(--muted); font-size:.9rem; }
  .top-quiz-timer { display:flex; justify-content:flex-end; align-items:center; margin:0 0 10px; min-height:34px; }
  .data-store { display:none; }
  .jump { display:flex; flex-wrap:wrap; gap:7px; margin:0 0 12px; justify-content:center; }
  .jump button { background:var(--card); color:var(--accent-d); border:1px solid var(--line); border-radius:10px; padding:7px 10px; font-weight:700; cursor:pointer; min-width:34px; }
  .jump button.current { background:var(--accent); color:#fff; border-color:var(--accent-d); }
  .jump button.done { background:var(--good-bg); border-color:var(--good); }
  .jump button.miss { background:var(--bad-bg); border-color:var(--bad); }
  .progress-track { width:100%; height:6px; background:var(--bg-soft); border-radius:999px; overflow:hidden; margin-bottom:16px; }
  .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .3s ease; }
  .card { background:var(--card); border-radius:var(--radius); padding:24px 22px 20px; box-shadow:var(--shadow); }
  .qnum { font-size:.75rem; letter-spacing:1.2px; color:var(--accent); text-transform:uppercase; margin-bottom:6px; font-weight:600; }
  .qtype-tag { display:inline-block; margin-left:8px; padding:2px 8px; border-radius:999px; background:var(--hi); color:#6b4f1a; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
  .qtext { font-size:1.08rem; margin:4px 0 16px; color:var(--ink); }
  .source { font-size:.78rem; color:var(--muted); margin-top:-8px; margin-bottom:14px; }
  code { background:var(--hi); padding:1px 6px; border-radius:4px; font-family:"SF Mono", Menlo, Consolas, monospace; font-size:.92em; }
  .options { display:grid; gap:9px; }
  .opt {
    text-align:left; background:#FFFDF6; border:1.5px solid var(--line); color:var(--ink);
    padding:11px 13px; border-radius:10px; font-size:.96rem; cursor:pointer;
    transition:all .15s ease; font-family:inherit; line-height:1.45; width:100%;
    display:flex; align-items:center; white-space:normal; overflow:hidden;
  }
  .opt:hover:not(:disabled) { border-color:var(--accent); background:#FFFEFA; transform:translateY(-1px); }
  .opt:disabled { cursor:default; }
  .opt.correct, .opt.reveal { background:var(--good-bg); border-color:var(--good); color:#2f4a2f; }
  .opt.wrong { background:var(--bad-bg); border-color:var(--bad); color:#5a2c26; }
  .marker { display:inline-block; width:22px; height:22px; line-height:22px; border-radius:50%; background:var(--bg-soft); color:var(--muted); text-align:center; font-size:.78rem; margin-right:10px; font-weight:700; flex:0 0 auto; }
  .opt.correct .marker, .opt.reveal .marker { background:var(--good); color:white; }
  .opt.wrong .marker { background:var(--bad); color:white; }
  .optText { display:inline-block; }
  .small { color:var(--muted); font-size:.84rem; }

  .select-match { display:flex; flex-direction:column; gap:10px; }
  .select-row { display:grid; grid-template-columns:minmax(170px, 34%) 1fr; gap:10px; align-items:center; background:#FFFDF6; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; }
  .select-term { font-weight:700; color:var(--accent-d); font-size:.94rem; }
  .select-row select { width:100%; font:inherit; color:var(--ink); background:white; border:1.5px solid var(--line); border-radius:9px; padding:8px 10px; cursor:pointer; }
  .select-row.correct { background:var(--good-bg); border-color:var(--good); }
  .select-row.wrong { background:var(--bad-bg); border-color:var(--bad); }
  .select-row.correct select { border-color:var(--good); background:#f7fff4; color:#2f4a2f; }
  .select-row.wrong select { border-color:var(--bad); background:#fff6f3; color:#5a2c26; }
  .select-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:13px; }
  .dd-hint { font-size:.85rem; color:var(--accent-d); margin-bottom:14px; padding:8px 12px; background:rgba(91,138,138,.08); border-radius:8px; border-left:3px solid var(--accent); }
  .dd-card { background:var(--card); border:1.5px solid var(--accent); color:var(--accent-d); padding:7px 12px; border-radius:8px; font-size:.9rem; cursor:grab; font-weight:500; user-select:none; -webkit-user-select:none; touch-action:none; -webkit-user-drag:none; transition:background .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease, transform .15s ease; font-family:inherit; line-height:1.4; text-align:left; }
  .dd-card:hover:not(:disabled) { background:#fff; }
  .dd-card:active:not(:disabled) { cursor:grabbing; }
  .dd-card.selected { background:#FFFDF6; color:var(--accent-d); transform:translateY(-1px); box-shadow:0 0 0 3px rgba(91,138,138,.22); }
  .dd-card.drag-source { opacity:1; background:#FFFDF6; color:var(--accent-d); border-color:var(--accent-d); box-shadow:0 0 0 3px rgba(91,138,138,.18); }
  .dd-drag-ghost { position:fixed; left:0; top:0; z-index:9998; pointer-events:none; opacity:1; background:#FFFDF6; color:var(--accent-d); border:1.5px solid var(--accent-d); box-shadow:0 14px 30px rgba(46,58,58,.2); transform:translate3d(var(--drag-x,0), var(--drag-y,0), 0); cursor:grabbing; max-width:min(420px, calc(100vw - 28px)); }
  .dd-card.correct { background:var(--good-bg); border-color:var(--good); color:#2f4a2f; cursor:default; }
  .dd-card.wrong { background:var(--bad-bg); border-color:var(--bad); color:#5a2c26; cursor:default; }
  .slot-target { border:2px dashed var(--line); border-radius:8px; background:var(--bg-soft); padding:5px; min-height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color .15s ease, background .15s ease, box-shadow .15s ease; }
  .slot-target:hover { border-color:var(--accent); }
  .slot-target.drop-active { border-color:var(--accent-d); background:#FFFDF6; box-shadow:inset 0 0 0 2px rgba(91,138,138,.18); }
  .slot-target.has-card { border-style:solid; background:#fbf3df; padding:4px; }
  .slot-target.correct { border-color:var(--good); background:var(--good-bg); border-style:solid; }
  .slot-target.wrong { border-color:var(--bad); background:var(--bad-bg); border-style:solid; }
  .slot-target .placeholder { color:var(--muted); font-size:.82rem; }
  .slot-target .dd-card { width:100%; }
  .match-list, .order-list { display:flex; flex-direction:column; gap:8px; }
  .match-row { display:flex; align-items:center; gap:10px; }
  .match-label { flex:1; font-size:.9rem; color:var(--ink); }
  .match-row .slot-target { width:320px; flex:none; }
  .order-row { display:flex; align-items:stretch; gap:10px; }
  .order-num { width:34px; min-height:44px; border-radius:8px; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; font-size:1rem; }
  .order-row .slot-target { flex:1; }
  .card-bank { margin-top:14px; padding:11px 12px; background:var(--bg-soft); border-radius:10px; border:1px solid var(--line); }
  .card-bank-label { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-weight:600; }
  .card-bank-cards { display:flex; flex-wrap:wrap; gap:6px; min-height:38px; border:1.5px dashed transparent; border-radius:9px; padding:3px; transition:border-color .15s ease, background .15s ease; }
  .card-bank-cards.drop-active { border-color:var(--accent); background:#FFFDF6; }
  .fillbox { display:grid; gap:10px; }
  .fill-row { background:#FFFDF6; border:1.5px solid var(--line); border-radius:10px; padding:12px 13px; font-size:.96rem; }
  .fill-row input { font:inherit; font-weight:600; color:var(--ink); padding:6px 8px; margin:0 4px; border-radius:8px; border:1.5px solid var(--line); background:#fff; min-width:170px; max-width:100%; }
  .fill-row input.correct { background:var(--good-bg); border-color:var(--good); color:#2f4a2f; }
  .feedback { margin-top:14px; padding:11px 13px; border-radius:10px; font-size:.92rem; display:none; line-height:1.5; }
  .feedback.good { background:var(--good-bg); color:#2f4a2f; display:block; }
  .feedback.bad { background:var(--bad-bg); color:#5a2c26; display:block; }
  .feedback.info { background:var(--bg-soft); color:var(--ink); display:block; }
  .actions { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
  button.btn { background:var(--accent); color:#FBF7EC; border:none; padding:11px 18px; border-radius:10px; font-size:.96rem; font-weight:600; cursor:pointer; font-family:inherit; transition:background .15s ease, transform .1s ease; display:inline-flex; align-items:center; justify-content:center; vertical-align:middle; }
  button.btn:hover { background:var(--accent-d); }
  button.btn:active { transform:translateY(1px); }
  button.btn.ghost { background:transparent; color:var(--accent-d); border:1.5px solid var(--accent); }
  button.btn.ghost:hover { background:var(--bg-soft); }
  button.btn.arrow { width:50px; padding:11px 0; font-size:1.2rem; line-height:1; }
  .result { text-align:center; padding:12px 6px 6px; }
  .result h2 { margin:0 0 6px; color:var(--accent-d); font-size:1.5rem; }
  .score-big { font-size:2.6rem; font-weight:700; color:var(--ink); margin:12px 0 4px; }
  footer { text-align:center; color:var(--muted); font-size:.78rem; margin-top:20px; }

  .hidden { display:none !important; }
  .opening { text-align:center; padding:28px 18px 24px; }
  .opening h2 { margin:0 0 8px; color:var(--accent-d); font-size:1.55rem; }
  .opening p { margin:8px auto; max-width:620px; color:var(--muted); }
  .opening .attempt-badge { display:inline-block; margin:14px 0 18px; background:var(--bg-soft); border:1px solid var(--line); border-radius:999px; padding:7px 14px; color:var(--ink); font-weight:700; }
  .opening-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .practice-message { margin:12px auto 0; max-width:520px; }
  .attempt-history { margin:18px auto 18px; max-width:620px; text-align:left; background:#FFFDF6; border:1.5px solid var(--line); border-radius:var(--radius); padding:14px; box-shadow:0 2px 0 rgba(46,58,58,0.04); }
  .attempt-history h3 { margin:0 0 10px; color:var(--accent-d); font-size:1rem; }
  .attempt-list { list-style:none; padding:0; margin:0; display:grid; gap:8px; }
  .attempt-list li { display:flex; justify-content:space-between; gap:10px; align-items:center; background:var(--bg-soft); border:1px solid var(--line); border-radius:10px; padding:9px 11px; font-size:.9rem; }
  .attempt-list .attempt-meta { color:var(--muted); font-size:.8rem; }
  .attempt-list .attempt-score { color:var(--ink); font-weight:800; white-space:nowrap; }
  .submit-row { justify-content:space-between; align-items:center; }
  .submit-note { color:var(--muted); font-size:.84rem; }
  .timer-pill { position:relative; overflow:hidden; display:inline-flex; align-items:center; gap:9px; min-width:104px; justify-content:center; background:linear-gradient(180deg, #FFFDF6, var(--card)); padding:7px 15px 8px 12px; border-radius:999px; border:1px solid var(--line); transition:background .35s ease, border-color .35s ease, color .35s ease, box-shadow .35s ease; font-weight:800; color:var(--accent-d); box-shadow:0 5px 16px rgba(46,58,58,0.07), inset 0 1px 0 rgba(255,255,255,.7); letter-spacing:.6px; }
  .stopwatch { position:relative; width:22px; height:22px; border:2px solid currentColor; border-radius:50%; flex:0 0 auto; opacity:.9; box-shadow:inset 0 0 0 2px rgba(255,255,255,.45); }
  .stopwatch::before { content:""; position:absolute; width:8px; height:4px; border-radius:4px 4px 2px 2px; background:currentColor; left:50%; top:-7px; transform:translateX(-50%); opacity:.82; }
  .stopwatch::after { content:""; position:absolute; width:5px; height:3px; border-radius:4px; background:currentColor; right:-5px; top:1px; transform:rotate(38deg); opacity:.65; }
  .stopwatch-hand { position:absolute; left:50%; top:50%; width:2px; height:7px; border-radius:999px; background:currentColor; transform-origin:50% 100%; transform:translate(-50%, -100%) rotate(0deg); }
  .timer-pill.running .stopwatch-hand { animation:stopwatchTick var(--timer-duration, 900s) linear forwards; }
  .stopwatch-hand::after { content:""; position:absolute; left:50%; bottom:-3px; width:4px; height:4px; border-radius:50%; background:currentColor; transform:translateX(-50%); }
  .timer-pill.warning { background:linear-gradient(180deg, #fff8f2, var(--bad-bg)); border-color:var(--bad); color:#5a2c26; }
  .timer-pill.warning .stopwatch { opacity:1; }
  .timer-pill.urgent { box-shadow:0 0 0 3px rgba(255,80,80,.14), 0 5px 16px rgba(46,58,58,0.07); }
  .loading-screen { display:flex; align-items:center; justify-content:center; padding:12px 0; min-height:240px; background:transparent; }
  .loading-panel { width:min(100%, 460px); margin:0 auto; background:linear-gradient(180deg, #FFFDF6 0%, var(--card) 100%); color:var(--ink); border:1.5px solid var(--line); border-radius:18px; padding:26px 18px 22px; box-shadow:0 10px 28px rgba(46,58,58,.08), inset 0 1px 0 rgba(255,255,255,.6); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .loading-title { font-size:1.35rem; font-weight:700; margin:16px 0 8px; letter-spacing:.2px; color:var(--accent-d); text-align:center; }
  .loading-sub { color:var(--muted); font-size:.92rem; text-align:center; max-width:360px; line-height:1.6; }
  .loading-mini { margin-top:10px; color:var(--muted); font-size:.8rem; text-align:center; }
  .wait-orb { position:relative; width:108px; height:108px; }
  .wait-core { position:absolute; inset:38px; border-radius:50%; background:linear-gradient(180deg, var(--card), #fff); border:1px solid var(--line); box-shadow:inset 0 2px 8px rgba(46,58,58,.06); }
  .wait-ring { position:absolute; border-radius:50%; border:4px solid transparent; }
  .wait-ring.ring-a { inset:0; border-top-color:var(--accent); border-right-color:#82AAA6; animation:spinRing 1s linear infinite; }
  .wait-ring.ring-b { inset:12px; border-bottom-color:var(--hi); border-left-color:#9BBDB5; animation:spinRingReverse 1.35s linear infinite; }
  .wait-dot { position:absolute; width:12px; height:12px; border-radius:50%; background:#E8C97A; top:10px; left:calc(50% - 6px); box-shadow:0 0 0 5px rgba(232,201,122,.14); animation:dotPulse 1.2s ease-in-out infinite; }
  @keyframes spinRing { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  @keyframes spinRingReverse { from { transform:rotate(360deg); } to { transform:rotate(0deg); } }
  @keyframes dotPulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(.82); opacity:.75; } }
  .guard-toast { position:fixed; left:50%; top:18px; transform:translateX(-50%) translateY(-10px); opacity:0; pointer-events:none; z-index:9999; background:linear-gradient(180deg, #FFFDF6, var(--card)); color:var(--accent-d); border:1.5px solid var(--line); border-radius:999px; padding:9px 15px; box-shadow:0 10px 26px rgba(46,58,58,.12); font-size:.9rem; font-weight:700; transition:opacity .18s ease, transform .18s ease; }
  .guard-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  @keyframes stopwatchTick { from { transform:translate(-50%, -100%) rotate(0deg); } to { transform:translate(-50%, -100%) rotate(360deg); } }
  @media (max-width: 560px) {
    body { padding:14px 10px 40px; }
    .card { padding:20px 16px 18px; }
    .qtext { font-size:1rem; }
    header h1 { font-size:1.25rem; }
    .match-row { flex-direction:column; align-items:stretch; gap:4px; }
    .select-row { grid-template-columns:1fr; gap:6px; }
    .match-row .slot-target { width:100%; }
    .fill-row input { width:100%; margin:8px 0 0; }
    .loading-panel { padding:22px 14px 18px; }
    .wait-orb { width:92px; height:92px; }
    .wait-core { inset:32px; }
    .loading-title { font-size:1.2rem; }
    .timer-pill { min-width:98px; padding-right:13px; }
    .stopwatch { width:20px; height:20px; }
  }

  .qtext { display:block; }
  .code-console {
    margin:10px 0 2px;
    width:max-content;
    max-width:100%;
    overflow:auto;
    background:#102d3d;
    color:#d8e7ee;
    border:1px solid rgba(255,255,255,.05);
    border-radius:0;
    padding:10px 14px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    font-family:Consolas, "SFMono-Regular", Menlo, Monaco, "Courier New", monospace;
    font-size:1.12rem;
    line-height:1.38;
    font-weight:700;
    letter-spacing:.1px;
    white-space:pre;
    tab-size:4;
  }
  .code-console code {
    background:transparent;
    padding:0;
    border-radius:0;
    font:inherit;
    color:inherit;
  }
  .tok-id { color:#d8e7ee; }
  .tok-fn { color:#ffd565; }
  .tok-kw { color:#f2a34d; }
  .tok-num, .tok-br { color:#ef5f8f; }
  .tok-str { color:#8ee481; }
  .tok-op { color:#e39a35; }
  .tok-comment { color:#78909c; }
  @media (max-width:560px){
    .code-console { font-size:.96rem; padding:9px 11px; width:100%; }
  }

</style>
</head>
<body>
<div class="wrap">
  <div class="top-quiz-timer hidden" id="quizBar">
    <span class="timer-pill" id="timerPill"><span class="stopwatch" aria-hidden="true"><span class="stopwatch-hand"></span></span><strong id="timer">20:00</strong></span>
  </div>
  <header>
    <h1>Lecture 07–08 Python Practice Quiz</h1>
    <p>24 questions · 20-minute timer · previous-quiz style · loop/function mastery 🐍</p>
  </header>
  <div class="data-store" aria-hidden="true">
    <span id="round">1</span>
    <span id="qIdx">1</span>
    <span id="qTotal">0</span>
    <span id="score">0</span>
    <span id="best">—</span>
    <span id="completed">0</span>
  </div>
  <div class="jump" id="jump"></div>
  <div class="progress-track" id="progressTrack"><div class="progress-fill" id="progress"></div></div>
  <div class="card" id="card"></div>
  <footer>Python basics · indexing · slicing · sets · operators · control flow</footer>
</div>
<script>
const BANK = [
  {
    "id": "q01",
    "type": "mcq",
    "title": "while condition",
    "source": "Lecture 07 · while loops",
    "prompt": "What is the output of the following code snippet?<pre class=\"code-console\" aria-label=\"code snippet\"><code><span class=\"tok-id\">i</span> <span class=\"tok-op\">=</span> <span class=\"tok-num\">1</span>\n\n<span class=\"tok-kw\">while</span> <span class=\"tok-id\">i</span> <span class=\"tok-op\">&lt;</span> <span class=\"tok-num\">4</span><span class=\"tok-op\">:</span>\n\n    <span class=\"tok-fn\">print</span><span class=\"tok-br\">(</span><span class=\"tok-id\">i</span><span class=\"tok-br\">)</span>\n\n    <span class=\"tok-id\">i</span> <span class=\"tok-op\">+=</span> <span class=\"tok-num\">1</span>\n</code></pre>",
    "options": [
      {
        "text": "1 2 3",
        "correct": true
      },
      {
        "text": "1 2 3 4",
        "correct": false
      },
      {
        "text": "2 3 4",
        "correct": false
      },
      {
        "text": "1 3 4",
        "correct": false
      }
    ],
    "explanation": "The loop starts with i = 1. It prints 1, then 2, then 3. After that i becomes 4, and the condition i < 4 is false, so the loop stops. 4 is not printed because the test is checked before each loop run."
  },
  {
    "id": "q02",
    "type": "mcq",
    "title": "break statement",
    "source": "Lecture 07 · while loop options",
    "prompt": "What is the output of the following code snippet?<pre class=\"code-console\" aria-label=\"code snippet\"><code><span class=\"tok-id\">i</span> <span class=\"tok-op\">=</span> <span class=\"tok-num\">1</span>\n\n<span class=\"tok-kw\">while</span> <span class=\"tok-id\">i</span> <span class=\"tok-op\">&lt;</span> <span class=\"tok-num\">6</span><span class=\"tok-op\">:</span>\n\n    <span class=\"tok-fn\">print</span><span class=\"tok-br\">(</span><span class=\"tok-id\">i</span><span class=\"tok-br\">)</span>\n\n    <span class=\"tok-kw\">if</span> <span class=\"tok-id\">i</span> <span class=\"tok-op\">==</span> <span class=\"tok-num\">3</span><span class=\"tok-op\">:</span>\n\n        <span class=\"tok-kw\">break</span>\n\n    <span class=\"tok-id\">i</span> <span class=\"tok-op\">+=</span> <span class=\"tok-num\">1</span>\n</code></pre>",
    "options": [
      {
        "text": "1 2 3",
        "correct": true

function shuffle(arr) { const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function norm(s) { return String(s||'').toLowerCase().replace(/[.,;:!?()[\]{}"']/g,'').replace(/[-‐‑‒–—]/g,' ').replace(/\s+/g,' ').trim(); }
function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }

function showGuardToast(message='Quiz attempt protected. Finish or submit this attempt first.') {
  let toast = document.getElementById('guardToast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'guardToast';
    toast.className = 'guard-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.classList.add('show');
  if(guardToastTimer) clearTimeout(guardToastTimer);
  guardToastTimer = setTimeout(()=>toast.classList.remove('show'), 2200);
}
function pushGuardState() {

}

}

}

}

  if(!navigationGuardActive || attemptSubmitted || !order.length) return;

function getAttemptHistory() { try { return JSON.parse(lsGet(STORE_PREFIX+'history') || '[]'); } catch(e) { return []; } }

function appendAttemptRecord(record) { const history = getAttemptHistory(); history.push(record); saveAttemptHistory(history); lsSet(STORE_PREFIX+'completed', String(history.length)); return history.length; }
function formatAttemptDate(iso) {
  try {
    const d = new Date(iso);

  } catch(e) { return 'saved attempt'; }
}
function renderAttemptHistoryList(history) {
  if(!history.length) return '';
  const rows = history.map((a,i)=>{
    const pct = Math.round((a.score / a.total) * 100);
    const label = a.timeExpired ? 'auto-submitted, time up' : 'submitted';

    return `<li><span><strong>Attempt ${i+1}</strong><br><span class="attempt-meta">${escapeHTML(formatAttemptDate(a.submittedAt))} · ${label} · wrong marks: ${wrongCount}</span></span><span class="attempt-score">${a.score} / ${a.total} · ${pct}%</span></li>`;

function mixRGB(a,b,t){ const m=(x,y)=>Math.round(x+(y-x)*t); return `rgb(${m(a[0],b[0])}, ${m(a[1],b[1])}, ${m(a[2],b[2])})`; }
function updateTimerDisplay() {

    elTimerPill.style.borderColor = mixRGB([255, 95, 95], [204, 0, 0], t);

  const resultTitle = attempt.timeExpired ? 'Time is up — attempt submitted' : 'Attempt submitted';
  const timeLine = attempt.timeExpired ? 'The 15-minute timer ended, the quiz was submitted automatically, and the attempt was locked.' : `Time remaining when submitted: <strong>${formatTime(Math.max(0, attempt.remainingSeconds))}</strong>. This attempt has been locked and cannot be edited.`;
  elCard.innerHTML=`<div class="result"><h2>${resultTitle}</h2><div class="score-big">${attempt.score} / ${total}</div><p>${pct}% correct</p><p class="small">${timeLine}</p><p class="small">Answered questions counted: ${attempt.answeredCount} / ${total}. Completed attempts saved in this browser: <strong>${completed}</strong>.</p><p class="small">This locked attempt will appear on the opening page. It will stay here until you press the return button.</p><p class="small">If there are wrong marks, the opening page can generate an incorrect-question-only practice set from this latest attempt.</p><div class="actions" style="justify-content:center"><button class="btn" onclick="showOpening()">Return to opening page</button></div></div>`;
}
bootQuiz();
</script>
</body>
</html>
