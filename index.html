<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lecture 08-10 High-Yield Python Quiz</title>
<style>
  :root {
    --bg:        #F5EFE0;
    --bg-soft:   #EDE4D0;
    --card:      #FBF7EC;
    --ink:       #2E3A3A;
    --muted:     #6B7775;
    --accent:    #5B8A8A;
    --accent-d:  #406A6A;
    --good:      #7BA77B;
    --good-bg:   #DFEBDC;
    --bad:       #B8746B;
    --bad-bg:    #EFD9D3;
    --hi:        #E8C97A;
    --line:      #d8cfba;
    --shadow:    0 2px 0 rgba(46,58,58,0.08), 0 6px 18px rgba(46,58,58,0.06);
    --radius:    14px;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height:1.55; min-height:100vh; display:flex; justify-content:center;
    padding:24px 14px 60px;
  }
  .wrap { width:100%; max-width:860px; }
  header { text-align:center; margin-bottom:18px; }
  header h1 { font-size:1.45rem; margin:0 0 4px; color:var(--accent-d); letter-spacing:.3px; }
  header p { margin:0; color:var(--muted); font-size:.9rem; }
  .top-quiz-timer { display:flex; justify-content:flex-end; align-items:center; margin:0 0 10px; min-height:34px; }
  .data-store { display:none; }
  .jump { display:flex; flex-wrap:wrap; gap:7px; margin:0 0 12px; justify-content:center; }
  .jump button { background:var(--card); color:var(--accent-d); border:1px solid var(--line); border-radius:10px; padding:7px 10px; font-weight:700; cursor:pointer; min-width:34px; }
  .jump button.current { background:var(--accent); color:#fff; border-color:var(--accent-d); }
  .jump button.done { background:var(--good-bg); border-color:var(--good); }
  .jump button.miss { background:var(--bad-bg); border-color:var(--bad); }
  .progress-track { width:100%; height:6px; background:var(--bg-soft); border-radius:999px; overflow:hidden; margin-bottom:16px; }
  .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .3s ease; }
  .card { background:var(--card); border-radius:var(--radius); padding:24px 22px 20px; box-shadow:var(--shadow); }
  .qnum { font-size:.75rem; letter-spacing:1.2px; color:var(--accent); text-transform:uppercase; margin-bottom:6px; font-weight:600; }
  .qtype-tag { display:inline-block; margin-left:8px; padding:2px 8px; border-radius:999px; background:var(--hi); color:#6b4f1a; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
  .qtext { font-size:1.08rem; margin:4px 0 16px; color:var(--ink); }
  .source { font-size:.78rem; color:var(--muted); margin-top:-8px; margin-bottom:14px; }
  code { background:var(--hi); padding:1px 6px; border-radius:4px; font-family:"SF Mono", Menlo, Consolas, monospace; font-size:.92em; }
  .options { display:grid; gap:9px; }
  .opt {
    text-align:left; background:#FFFDF6; border:1.5px solid var(--line); color:var(--ink);
    padding:11px 13px; border-radius:10px; font-size:.96rem; cursor:pointer;
    transition:all .15s ease; font-family:inherit; line-height:1.45; width:100%;
    display:flex; align-items:center; white-space:normal; overflow:hidden;
  }
  .opt:hover:not(:disabled) { border-color:var(--accent); background:#FFFEFA; transform:translateY(-1px); }
  .opt:disabled { cursor:default; }
  .opt.correct, .opt.reveal { background:var(--good-bg); border-color:var(--good); color:#2f4a2f; }
  .opt.wrong { background:var(--bad-bg); border-color:var(--bad); color:#5a2c26; }
  .marker { display:inline-block; width:22px; height:22px; line-height:22px; border-radius:50%; background:var(--bg-soft); color:var(--muted); text-align:center; font-size:.78rem; margin-right:10px; font-weight:700; flex:0 0 auto; }
  .opt.correct .marker, .opt.reveal .marker { background:var(--good); color:white; }
  .opt.wrong .marker { background:var(--bad); color:white; }
  .optText { display:inline-block; white-space:pre-wrap; }
  .small { color:var(--muted); font-size:.84rem; }

  .select-match { display:flex; flex-direction:column; gap:10px; }
  .select-row { display:grid; grid-template-columns:minmax(170px, 34%) 1fr; gap:10px; align-items:center; background:#FFFDF6; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; }
  .select-term { font-weight:700; color:var(--accent-d); font-size:.94rem; }
  .select-row select { width:100%; font:inherit; color:var(--ink); background:white; border:1.5px solid var(--line); border-radius:9px; padding:8px 10px; cursor:pointer; }
  .select-row.correct { background:var(--good-bg); border-color:var(--good); }
  .select-row.wrong { background:var(--bad-bg); border-color:var(--bad); }
  .select-row.correct select { border-color:var(--good); background:#f7fff4; color:#2f4a2f; }
  .select-row.wrong select { border-color:var(--bad); background:#fff6f3; color:#5a2c26; }
  .select-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:13px; }
  .dd-hint { font-size:.85rem; color:var(--accent-d); margin-bottom:14px; padding:8px 12px; background:rgba(91,138,138,.08); border-radius:8px; border-left:3px solid var(--accent); }
  .dd-card { background:var(--card); border:1.5px solid var(--accent); color:var(--accent-d); padding:7px 12px; border-radius:8px; font-size:.9rem; cursor:grab; font-weight:500; user-select:none; -webkit-user-select:none; touch-action:none; -webkit-user-drag:none; transition:background .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease, transform .15s ease; font-family:inherit; line-height:1.4; text-align:left; }
  .dd-card:hover:not(:disabled) { background:#fff; }
  .dd-card:active:not(:disabled) { cursor:grabbing; }
  .dd-card.selected { background:#FFFDF6; color:var(--accent-d); transform:translateY(-1px); box-shadow:0 0 0 3px rgba(91,138,138,.22); }
  .dd-card.drag-source { opacity:1; background:#FFFDF6; color:var(--accent-d); border-color:var(--accent-d); box-shadow:0 0 0 3px rgba(91,138,138,.18); }
  .dd-drag-ghost { position:fixed; left:0; top:0; z-index:9998; pointer-events:none; opacity:1; background:#FFFDF6; color:var(--accent-d); border:1.5px solid var(--accent-d); box-shadow:0 14px 30px rgba(46,58,58,.2); transform:translate3d(var(--drag-x,0), var(--drag-y,0), 0); cursor:grabbing; max-width:min(420px, calc(100vw - 28px)); }
  .dd-card.correct { background:var(--good-bg); border-color:var(--good); color:#2f4a2f; cursor:default; }
  .dd-card.wrong { background:var(--bad-bg); border-color:var(--bad); color:#5a2c26; cursor:default; }
  .slot-target { border:2px dashed var(--line); border-radius:8px; background:var(--bg-soft); padding:5px; min-height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color .15s ease, background .15s ease, box-shadow .15s ease; }
  .slot-target:hover { border-color:var(--accent); }
  .slot-target.drop-active { border-color:var(--accent-d); background:#FFFDF6; box-shadow:inset 0 0 0 2px rgba(91,138,138,.18); }
  .slot-target.has-card { border-style:solid; background:#fbf3df; padding:4px; }
  .slot-target.correct { border-color:var(--good); background:var(--good-bg); border-style:solid; }
  .slot-target.wrong { border-color:var(--bad); background:var(--bad-bg); border-style:solid; }
  .slot-target .placeholder { color:var(--muted); font-size:.82rem; }
  .slot-target .dd-card { width:100%; }
  .match-list, .order-list { display:flex; flex-direction:column; gap:8px; }
  .match-row { display:flex; align-items:center; gap:10px; }
  .match-label { flex:1; font-size:.9rem; color:var(--ink); }
  .match-row .slot-target { width:320px; flex:none; }
  .order-row { display:flex; align-items:stretch; gap:10px; }
  .order-num { width:34px; min-height:44px; border-radius:8px; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; font-size:1rem; }
  .order-row .slot-target { flex:1; }
  .card-bank { margin-top:14px; padding:11px 12px; background:var(--bg-soft); border-radius:10px; border:1px solid var(--line); }
  .card-bank-label { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-weight:600; }
  .card-bank-cards { display:flex; flex-wrap:wrap; gap:6px; min-height:38px; border:1.5px dashed transparent; border-radius:9px; padding:3px; transition:border-color .15s ease, background .15s ease; }
  .card-bank-cards.drop-active { border-color:var(--accent); background:#FFFDF6; }
  .fillbox { display:grid; gap:10px; }
  .fill-row { background:#FFFDF6; border:1.5px solid var(--line); border-radius:10px; padding:12px 13px; font-size:.96rem; }
  .fill-row input { font:inherit; font-weight:600; color:var(--ink); padding:6px 8px; margin:0 4px; border-radius:8px; border:1.5px solid var(--line); background:#fff; min-width:170px; max-width:100%; }
  .fill-row input.correct { background:var(--good-bg); border-color:var(--good); color:#2f4a2f; }
  .feedback { margin-top:14px; padding:11px 13px; border-radius:10px; font-size:.92rem; display:none; line-height:1.5; }
  .feedback.good { background:var(--good-bg); color:#2f4a2f; display:block; }
  .feedback.bad { background:var(--bad-bg); color:#5a2c26; display:block; }
  .feedback.info { background:var(--bg-soft); color:var(--ink); display:block; }
  .actions { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
  button.btn { background:var(--accent); color:#FBF7EC; border:none; padding:11px 18px; border-radius:10px; font-size:.96rem; font-weight:600; cursor:pointer; font-family:inherit; transition:background .15s ease, transform .1s ease; display:inline-flex; align-items:center; justify-content:center; vertical-align:middle; }
  button.btn:hover { background:var(--accent-d); }
  button.btn:active { transform:translateY(1px); }
  button.btn.ghost { background:transparent; color:var(--accent-d); border:1.5px solid var(--accent); }
  button.btn.ghost:hover { background:var(--bg-soft); }
  button.btn.arrow { width:50px; padding:11px 0; font-size:1.2rem; line-height:1; }
  .result { text-align:center; padding:12px 6px 6px; }
  .result h2 { margin:0 0 6px; color:var(--accent-d); font-size:1.5rem; }
  .score-big { font-size:2.6rem; font-weight:700; color:var(--ink); margin:12px 0 4px; }
  footer { text-align:center; color:var(--muted); font-size:.78rem; margin-top:20px; }

  .hidden { display:none !important; }
  .opening { text-align:center; padding:28px 18px 24px; }
  .opening h2 { margin:0 0 8px; color:var(--accent-d); font-size:1.55rem; }
  .opening p { margin:8px auto; max-width:620px; color:var(--muted); }
  .opening .attempt-badge { display:inline-block; margin:14px 0 18px; background:var(--bg-soft); border:1px solid var(--line); border-radius:999px; padding:7px 14px; color:var(--ink); font-weight:700; }
  .opening-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .practice-message { margin:12px auto 0; max-width:520px; }
  .attempt-history { margin:18px auto 18px; max-width:620px; text-align:left; background:#FFFDF6; border:1.5px solid var(--line); border-radius:var(--radius); padding:14px; box-shadow:0 2px 0 rgba(46,58,58,0.04); }
  .attempt-history h3 { margin:0 0 10px; color:var(--accent-d); font-size:1rem; }
  .attempt-list { list-style:none; padding:0; margin:0; display:grid; gap:8px; }
  .attempt-list li { display:flex; justify-content:space-between; gap:10px; align-items:center; background:var(--bg-soft); border:1px solid var(--line); border-radius:10px; padding:9px 11px; font-size:.9rem; }
  .attempt-list .attempt-meta { color:var(--muted); font-size:.8rem; }
  .attempt-list .attempt-score { color:var(--ink); font-weight:800; white-space:nowrap; }
  .submit-row { justify-content:space-between; align-items:center; }
  .submit-note { color:var(--muted); font-size:.84rem; }
  .timer-pill { position:relative; overflow:hidden; display:inline-flex; align-items:center; gap:9px; min-width:104px; justify-content:center; background:linear-gradient(180deg, #FFFDF6, var(--card)); padding:7px 15px 8px 12px; border-radius:999px; border:1px solid var(--line); transition:background .35s ease, border-color .35s ease, color .35s ease, box-shadow .35s ease; font-weight:800; color:var(--accent-d); box-shadow:0 5px 16px rgba(46,58,58,0.07), inset 0 1px 0 rgba(255,255,255,.7); letter-spacing:.6px; }
  .stopwatch { position:relative; width:22px; height:22px; border:2px solid currentColor; border-radius:50%; flex:0 0 auto; opacity:.9; box-shadow:inset 0 0 0 2px rgba(255,255,255,.45); }
  .stopwatch::before { content:""; position:absolute; width:8px; height:4px; border-radius:4px 4px 2px 2px; background:currentColor; left:50%; top:-7px; transform:translateX(-50%); opacity:.82; }
  .stopwatch::after { content:""; position:absolute; width:5px; height:3px; border-radius:4px; background:currentColor; right:-5px; top:1px; transform:rotate(38deg); opacity:.65; }
  .stopwatch-hand { position:absolute; left:50%; top:50%; width:2px; height:7px; border-radius:999px; background:currentColor; transform-origin:50% 100%; transform:translate(-50%, -100%) rotate(0deg); }
  .timer-pill.running .stopwatch-hand { animation:stopwatchTick var(--timer-duration, 900s) linear forwards; }
  .stopwatch-hand::after { content:""; position:absolute; left:50%; bottom:-3px; width:4px; height:4px; border-radius:50%; background:currentColor; transform:translateX(-50%); }
  .timer-pill.warning { background:linear-gradient(180deg, #fff8f2, var(--bad-bg)); border-color:var(--bad); color:#5a2c26; }
  .timer-pill.warning .stopwatch { opacity:1; }
  .timer-pill.urgent { box-shadow:0 0 0 3px rgba(255,80,80,.14), 0 5px 16px rgba(46,58,58,0.07); }
  .loading-screen { display:flex; align-items:center; justify-content:center; padding:12px 0; min-height:240px; background:transparent; }
  .loading-panel { width:min(100%, 460px); margin:0 auto; background:linear-gradient(180deg, #FFFDF6 0%, var(--card) 100%); color:var(--ink); border:1.5px solid var(--line); border-radius:18px; padding:26px 18px 22px; box-shadow:0 10px 28px rgba(46,58,58,.08), inset 0 1px 0 rgba(255,255,255,.6); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .loading-title { font-size:1.35rem; font-weight:700; margin:16px 0 8px; letter-spacing:.2px; color:var(--accent-d); text-align:center; }
  .loading-sub { color:var(--muted); font-size:.92rem; text-align:center; max-width:360px; line-height:1.6; }
  .loading-mini { margin-top:10px; color:var(--muted); font-size:.8rem; text-align:center; }
  .wait-orb { position:relative; width:108px; height:108px; }
  .wait-core { position:absolute; inset:38px; border-radius:50%; background:linear-gradient(180deg, var(--card), #fff); border:1px solid var(--line); box-shadow:inset 0 2px 8px rgba(46,58,58,.06); }
  .wait-ring { position:absolute; border-radius:50%; border:4px solid transparent; }
  .wait-ring.ring-a { inset:0; border-top-color:var(--accent); border-right-color:#82AAA6; animation:spinRing 1s linear infinite; }
  .wait-ring.ring-b { inset:12px; border-bottom-color:var(--hi); border-left-color:#9BBDB5; animation:spinRingReverse 1.35s linear infinite; }
  .wait-dot { position:absolute; width:12px; height:12px; border-radius:50%; background:#E8C97A; top:10px; left:calc(50% - 6px); box-shadow:0 0 0 5px rgba(232,201,122,.14); animation:dotPulse 1.2s ease-in-out infinite; }
  @keyframes spinRing { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  @keyframes spinRingReverse { from { transform:rotate(360deg); } to { transform:rotate(0deg); } }
  @keyframes dotPulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(.82); opacity:.75; } }
  .guard-toast { position:fixed; left:50%; top:18px; transform:translateX(-50%) translateY(-10px); opacity:0; pointer-events:none; z-index:9999; background:linear-gradient(180deg, #FFFDF6, var(--card)); color:var(--accent-d); border:1.5px solid var(--line); border-radius:999px; padding:9px 15px; box-shadow:0 10px 26px rgba(46,58,58,.12); font-size:.9rem; font-weight:700; transition:opacity .18s ease, transform .18s ease; }
  .guard-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  @keyframes stopwatchTick { from { transform:translate(-50%, -100%) rotate(0deg); } to { transform:translate(-50%, -100%) rotate(360deg); } }
  @media (max-width: 560px) {
    html, body { height:100%; overflow:hidden; }
    body { min-height:0; display:block; padding:0; }
    .wrap { height:100vh; height:100svh; overflow-y:auto; overscroll-behavior-y:contain; -webkit-overflow-scrolling:touch; padding:14px 10px 40px; }
    .card { padding:20px 16px 18px; }
    .qtext { font-size:1rem; }
    header h1 { font-size:1.25rem; }
    .match-row { flex-direction:column; align-items:stretch; gap:4px; }
    .select-row { grid-template-columns:1fr; gap:6px; }
    .match-row .slot-target { width:100%; }
    .fill-row input { width:100%; margin:8px 0 0; }
    .loading-panel { padding:22px 14px 18px; }
    .wait-orb { width:92px; height:92px; }
    .wait-core { inset:32px; }
    .loading-title { font-size:1.2rem; }
    .timer-pill { min-width:98px; padding-right:13px; }
    .stopwatch { width:20px; height:20px; }
  }

  .qtext { display:block; }
  .code-console {
    margin:10px 0 2px;
    width:100%;
    max-width:100%;
    overflow:visible;
    background:#102d3d;
    color:#d8e7ee;
    border:1px solid rgba(255,255,255,.05);
    border-radius:0;
    padding:10px 14px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    font-family:Consolas, "SFMono-Regular", Menlo, Monaco, "Courier New", monospace;
    font-size:.94rem;
    line-height:1.32;
    font-weight:400;
    letter-spacing:.05px;
    white-space:pre-wrap;
    overflow-wrap:anywhere;
    tab-size:4;
  }
  .code-console code {
    background:transparent;
    padding:0;
    border-radius:0;
    font:inherit;
    color:inherit;
  }
  .tok-id { color:#d8e7ee; }
  .tok-fn { color:#ffd565; }
  .tok-kw { color:#f2a34d; }
  .tok-num, .tok-br { color:#ef5f8f; }
  .tok-str { color:#8ee481; }
  .tok-op { color:#e39a35; }
  .tok-comment { color:#78909c; }
  @media (max-width:560px){
    .code-console { font-size:.84rem; padding:9px 11px; width:100%; }
  }

</style>
</head>
<body>
<div class="wrap">
  <div class="top-quiz-timer hidden" id="quizBar">
    <span class="timer-pill" id="timerPill"><span class="stopwatch" aria-hidden="true"><span class="stopwatch-hand"></span></span><strong id="timer">40:00</strong></span>
  </div>
  <header>
    <h1>Lecture 08-10 High-Yield Python Quiz</h1>
    <p>20 high-density questions · Lecture 08 Lambda to Lecture 10 Regex/Data Validation · 40-minute timer 🐍</p>
  </header>
  <div class="data-store" aria-hidden="true">
    <span id="round">1</span>
    <span id="qIdx">1</span>

    <span id="score">0</span>
    <span id="best">—</span>
    <span id="completed">0</span>
  </div>
  <div class="jump" id="jump"></div>
  <div class="progress-track" id="progressTrack"><div class="progress-fill" id="progress"></div></div>
  <div class="card" id="card"></div>
  <footer>Information Systems Programming · high-yield practice from Lecture 08 Lambda through Lecture 10 Regular Expressions</footer>
</div>
<script>
const BANK = [
  {
    "id": "l8q01",
    "type": "mcq",
    "title": "Lambda basics",
    "source": "Lecture 08 · Python Lambda Function",
    "prompt": "The slide says a lambda function is anonymous and can have only one expression. What is the output?<pre class=\"code-console\" aria-label=\"code snippet\"><code><span class=\"tok-id\">mul</span> <span class=\"tok-op\">=</span> <span class=\"tok-kw\">lambda</span> <span class=\"tok-id\">x</span><span class=\"tok-br\">,</span> <span class=\"tok-id\">z</span><span class=\"tok-br\">:</span> <span class=\"tok-id\">x</span> <span class=\"tok-op\">*</span> <span class=\"tok-id\">z</span>\n<span class=\"tok-id\">sq</span> <span class=\"tok-op\">=</span> <span class=\"tok-kw\">lambda</span> <span class=\"tok-id\">x</span><span class=\"tok-br\">:</span> <span class=\"tok-id\">x</span><span class=\"tok-op\">**</span><span class=\"tok-num\">2</span>\n\n<span class=\"tok-kw\">print</span><span class=\"tok-br\">(</span><span class=\"tok-fn\">mul</span><span class=\"tok-br\">(</span><span class=\"tok-num\">4</span><span class=\"tok-br\">,</span> <span class=\"tok-num\">8</span><span class=\"tok-br\">)</span><span class=\"tok-br\">)</span>\n<span class=\"tok-kw\">print</span><span class=\"tok-br\">(</span><span class=\"tok-fn\">sq</span><span class=\"tok-br\">(</span><span class=\"tok-num\">7</span><span class=\"tok-br\">)</span><span class=\"tok-br\">)</span></code></pre>",
    "options": [
      {
        "text": "32\n49",
        "correct": true
      },
      {
        "text": "12\n14",
        "correct": false
      },
      {
        "text": "32\n7",
        "correct": false
      },
      {
        "text": "4\n8",
        "correct": false
      }
    ],
    "explanation": "lambda can hold a short expression. mul(4, 8) gives 32, and sq(7) gives 49."
  },
  {
    "id": "l8q02",
    "type": "mcq",

    ? `<button class="btn ghost" onclick="showOpening()">Return to opening page</button>`
    : `<button class="btn" onclick="submitAttempt()">Submit</button>`;
  html += `<div class="feedback" id="fb"></div><div class="actions submit-row" id="acts"><div><button class="btn ghost arrow" onclick="prevQ()" aria-label="Previous question" title="Previous question">←</button> <button class="btn ghost arrow" onclick="nextQ()" aria-label="Next question" title="Next question">→</button>${resetControl}${item.type==='matching'?'':` <button class="btn ghost" onclick="showAnswer()" ${answered?'disabled':''}>Show answer</button>`}</div><div>${rightControls}</div></div>`;
  elCard.innerHTML=html;
  if(item.type==='mcq') attachMC(item); else if(item.type==='fill') attachFill(item); else if(item.type==='matching') attachSelectMatch(item); else attachDD(item);
  lockNotice(item);
  renderJump();
  saveActiveAttempt();
}
function renderMC_HTML(item) {
  const idxs=optionOrderFor(item, item.options);
  item._shuf=idxs;
  return `<div class="options">${idxs.map((orig,i)=>`<button class="opt" data-i="${i}"><span class="marker">${i+1}</span><span class="optText">${escapeHTML(item.options[orig].text)}</span></button>`).join('')}</div><p class="small">Wrong choices are plausible exam traps. Read the wording slowly.</p>`;
}
function attachMC(item) {
  const st=states[item.id];
  if(st?.answered){
    document.querySelectorAll('.opt').forEach((b,k)=>{
      const orig=item._shuf[k];
      b.disabled=true;
      if(item.options[orig].correct) b.classList.add('reveal');
      if(st.selectedOrig===orig) b.classList.add(st.correct?'correct':'wrong');
    });
    return;
  }
  document.querySelectorAll('.opt').forEach(btn=>{ btn.onclick=()=>{ if(answered)return; answered=true; const shownIndex=+btn.dataset.i; const orig=item._shuf[shownIndex]; const ok=!!item.options[orig].correct; document.querySelectorAll('.opt').forEach((b,k)=>{b.disabled=true; if(item.options[item._shuf[k]].correct)b.classList.add('reveal');}); btn.classList.add(ok?'correct':'wrong'); mark(ok,{selectedOrig:orig, optionOrder:item._shuf.slice()}); feedback((ok?'Correct. ':'Not quite. ')+item.explanation, ok?'good':'bad'); }; });
}
function renderFill_HTML(item) { return `<div class="fillbox">${item.sentences.map((s,i)=>`<label class="fill-row">${escapeHTML(s.before)}<input data-fill="${i}" autocomplete="off" autocapitalize="none" spellcheck="false" />${escapeHTML(s.after)}</label>`).join('')}</div><p class="small">Type the missing word or phrase. Correct blanks lock automatically.</p>`; }
function attachFill(item) {
  const st=states[item.id];
  const inputs=[...document.querySelectorAll('input[data-fill]')];
  if(st?.values){
    inputs.forEach((inp,i)=>{
      inp.value = st.values?.[i] || '';
      if(st.locked?.[i] || st.answered){ inp.classList.add('correct'); inp.disabled=true; }
    });
  }
  if(st?.answered){ return; }
  inputs.forEach(inp=>{ inp.addEventListener('input', checkFill); });
}
function checkFill() {
  const item=currentQ();
  if(answered) return;
  const inputs=[...document.querySelectorAll('input[data-fill]')];
  const st = states[item.id] || {answered:false, correct:false, values:Array(item.sentences.length).fill(''), locked:Array(item.sentences.length).fill(false)};
  st.values = st.values || Array(item.sentences.length).fill('');
  st.locked = st.locked || Array(item.sentences.length).fill(false);
  let allLocked=true;
  let allFilled=true;
  inputs.forEach(inp=>{
    const idx=+inp.dataset.fill;
    if(st.locked[idx]){ inp.disabled=true; inp.classList.add('correct'); return; }
    st.values[idx]=inp.value;
    const s=item.sentences[idx];
    const ok=s.answers.some(a=>norm(a)===norm(inp.value));
    if(ok){
      st.locked[idx]=true;
      inp.classList.add('correct');
      inp.disabled=true;
    } else {
      inp.classList.remove('correct');
    }
    if(!st.locked[idx]) allLocked=false;
    if(!inp.value.trim()) allFilled=false;
  });
  states[item.id]=st;
  saveActiveAttempt();
  if(st.locked.every(Boolean)){
    answered=true;
    mark(true,{values:st.values.slice(), locked:st.locked.slice()});
    feedback('Correct. '+item.explanation,'good');
  } else if(allFilled){
    feedback('Keep going. Correct blanks lock green immediately; remaining blanks still need revision.','info');
  }
}

function renderSelectMatch_HTML(item) {
  const st=questionState(item);
  const optionOrder = optionOrderFor(item, item.pairs);
  item._matchOptions = optionOrder;
  return `<div class="dd-hint">🌿 Choose the correct definition from each dropdown. When every row has a choice, press Check answers.</div><div class="select-match">${item.pairs.map((p,i)=>`<div class="select-row" data-row="${i}"><div class="select-term">${escapeHTML(p.left)}</div><select data-match="${i}"><option value="">Choose the best match...</option>${optionOrder.map(idx=>`<option value="${idx}">${escapeHTML(item.pairs[idx].right)}</option>`).join('')}</select></div>`).join('')}</div><div class="select-actions"><button class="btn" onclick="checkSelectMatch()" ${st?.answered?'disabled':''}>Check answers</button><button class="btn ghost" onclick="showAnswer()" ${st?.answered?'disabled':''}>Show answer</button></div><p class="small">No dragging now: term on the left, definition dropdown on the right. Tiny exam dojo, less finger acrobatics 🥢.</p>`;
}
function attachSelectMatch(item) {
  const st=states[item.id];
  const selects=[...document.querySelectorAll('select[data-match]')];
  if(st?.answered){
    selects.forEach(sel=>{
      const termIndex=+sel.dataset.match;
      sel.value=String(st.values?.[termIndex] ?? (st.revealed ? termIndex : ''));
      sel.disabled=true;
      const ok=st.rowResults?.[termIndex] ?? (st.revealed ? true : false);
      sel.closest('.select-row').classList.add(ok?'correct':'wrong');
    });
    return;
  }
  selects.forEach(sel=>{
    sel.addEventListener('change',()=>{
      if(answered) return;
      const allChosen=[...document.querySelectorAll('select[data-match]')].every(s=>s.value!=='');
      if(allChosen) feedback('All rows have choices. Press Check answers to grade this set.','info');
    });
  });
}
function checkSelectMatch() {
  const item=currentQ();
  if(answered || item.type!=='matching') return;
  const selects=[...document.querySelectorAll('select[data-match]')];
  const allChosen=selects.every(s=>s.value!=='');
  if(!allChosen){ feedback('Choose one definition for every term first.','info'); return; }
  let allCorrect=true;
  const values=[];
  const rowResults=[];
  selects.forEach(sel=>{
    const row=sel.closest('.select-row');
    const termIndex=+sel.dataset.match;
    const chosenIndex=+sel.value;
    const ok=termIndex===chosenIndex;
    values[termIndex]=chosenIndex;
    rowResults[termIndex]=ok;
    row.classList.add(ok?'correct':'wrong');
    if(!ok) allCorrect=false;
    sel.disabled=true;
  });
  answered=true;
  mark(allCorrect,{values, rowResults, optionOrder:item._matchOptions.slice()});
  feedback((allCorrect?'Correct. ':'Not quite. ')+item.explanation, allCorrect?'good':'bad');
}
function setupDD(item) {
  const st=questionState(item);
  if(st?.ddSetup) return cloneData(st.ddSetup);
  let cards, slots, slotOrder;
  if(item.type==='matching'){
    cards=item.pairs.map((p,i)=>({id:'c'+i,text:p.right,correctSlot:'s'+i})); slots=item.pairs.map((p,i)=>({id:'s'+i,label:p.left,multi:false})); slotOrder=shuffle(slots.map(s=>s.id));
  } else {
    cards=item.items.map((t,i)=>({id:'c'+i,text:t,correctSlot:'s'+i})); slots=item.items.map((_,i)=>({id:'s'+i,label:String(i+1),multi:false})); slotOrder=slots.map(s=>s.id);
  }
  const setup = {cards,slots,slotOrder,cardOrder:shuffle(cards.map(c=>c.id)),type:item.type};
  st.ddSetup = cloneData(setup);
  return setup;
}
function renderDD_HTML(item) {
  currentDD=setupDD(item);
  const st=states[item.id];
  if(st?.placements) dragState.placements={...st.placements};
  const hint=item.type==='matching'
    ? 'Drag a card into its matching slot. Drop a placed card back into Cards to remove it.'
    : 'Drag a card into the correct numbered slot. Drop a placed card back into Cards to remove it.';
  return `<div class="dd-hint">${hint}</div><div id="ddArea"></div>`;
}
function attachDD(item) {
  renderDDArea(item);
  const st=states[item.id];
  if(st?.answered){
    renderDDFeedback(st.rowResults || {});
    document.querySelectorAll('.dd-card').forEach(card=>card.disabled=true);
  }
}
function renderDDArea(item) {
  const area=document.getElementById('ddArea');
  let h='';
  if(currentDD.type==='matching') h+=renderMatchSlots(); else h+=renderOrderSlots();
  const inBank=currentDD.cardOrder.filter(cid=>!dragState.placements[cid]);
  h+=`<div class="card-bank"><div class="card-bank-label">Cards (${inBank.length} left)</div><div class="card-bank-cards" data-bank="true">${inBank.length?inBank.map(cid=>{const c=currentDD.cards.find(x=>x.id===cid); const sel=dragState.selected===cid?' selected':''; return `<button class="dd-card${sel}" data-card="${cid}" draggable="false">${escapeHTML(c.text)}</button>`;}).join(''):'<span class="small">All placed.</span>'}</div></div>`;
  area.innerHTML=h;
  area.querySelectorAll('.dd-card').forEach(el=>{
    el.addEventListener('pointerdown', e=>startCardDrag(e,item,el));
    el.onclick=e=>{
      e.stopPropagation();
      if(suppressDDClick){ suppressDDClick=false; return; }
      onCardClick(item,el.dataset.card);
    };
  });
  area.querySelectorAll('[data-slot]').forEach(el=>{el.onclick=()=>onSlotClick(item,el.dataset.slot);});
  autoCheckDD(item,false);
}
function renderMatchSlots() { return `<div class="match-list">${currentDD.slotOrder.map(sid=>{const slot=currentDD.slots.find(s=>s.id===sid); return `<div class="match-row"><div class="match-label">${escapeHTML(slot.label)}</div>${slotHTML(sid)}</div>`;}).join('')}</div>`; }
function renderOrderSlots() { return `<div class="order-list">${currentDD.slotOrder.map(sid=>{const slot=currentDD.slots.find(s=>s.id===sid); return `<div class="order-row"><div class="order-num">${slot.label}</div>${slotHTML(sid)}</div>`;}).join('')}</div>`; }
function slotHTML(sid) {
  const cardId=Object.keys(dragState.placements).find(cid=>dragState.placements[cid]===sid);
  if(cardId){
    const c=currentDD.cards.find(x=>x.id===cardId);
    return `<div class="slot-target has-card" data-slot="${sid}"><button class="dd-card" data-card="${cardId}" draggable="false">${escapeHTML(c.text)}</button></div>`;
  }
  return `<div class="slot-target" data-slot="${sid}"><span class="placeholder">drop here</span></div>`;
}
function onCardClick(item,cardId) {
  if(answered)return;
  if(dragState.placements[cardId]){
    delete dragState.placements[cardId];
    dragState.selected=null;
  } else {
    dragState.selected=(dragState.selected===cardId)?null:cardId;
  }
  renderDDArea(item);
  saveActiveAttempt();
}
function onSlotClick(item,slotId) {
  if(answered||!dragState.selected)return;
  placeCardInSlot(item, dragState.selected, slotId);
}
function placeCardInSlot(item, cardId, slotId) {
  if(answered)return;
  Object.keys(dragState.placements).forEach(cid=>{
    if(cid===cardId || dragState.placements[cid]===slotId) delete dragState.placements[cid];
  });
  dragState.placements[cardId]=slotId;
  dragState.selected=null;
  renderDDArea(item);
  saveActiveAttempt();
}
function returnCardToBank(item, cardId) {
  if(answered)return;
  delete dragState.placements[cardId];
  dragState.selected=null;
  renderDDArea(item);
  saveActiveAttempt();
}
function startCardDrag(e,item,el) {
  if(answered || (e.pointerType==='mouse' && e.button!==0)) return;
  e.preventDefault();
  const rect=el.getBoundingClientRect();
  ddDrag={
    item,
    cardId:el.dataset.card,
    sourceEl:el,
    pointerId:e.pointerId,
    startX:e.clientX,
    startY:e.clientY,
    offsetX:e.clientX-rect.left,
    offsetY:e.clientY-rect.top,
    rect,
    moved:false,
    ghost:null
  };
  el.classList.add('drag-source');
  try { el.setPointerCapture(e.pointerId); } catch(err) {}
  el.addEventListener('pointermove', onCardDragMove);
  el.addEventListener('pointerup', onCardDragEnd);
  el.addEventListener('pointercancel', onCardDragCancel);
}
function ensureDragGhost() {
  if(!ddDrag || ddDrag.ghost) return;
  const ghost=ddDrag.sourceEl.cloneNode(true);
  ghost.classList.remove('selected','correct','wrong');
  ghost.classList.add('dd-drag-ghost');
  ghost.setAttribute('aria-hidden','true');
  ghost.style.width=ddDrag.rect.width+'px';
  ghost.style.minHeight=ddDrag.rect.height+'px';
  document.body.appendChild(ghost);
  ddDrag.ghost=ghost;
}
function onCardDragMove(e) {
  if(!ddDrag || e.pointerId!==ddDrag.pointerId) return;
  const dx=e.clientX-ddDrag.startX;
  const dy=e.clientY-ddDrag.startY;
  if(!ddDrag.moved && Math.hypot(dx,dy)<4) return;
  ddDrag.moved=true;
  ensureDragGhost();
  ddDrag.ghost.style.setProperty('--drag-x', (e.clientX-ddDrag.offsetX)+'px');
  ddDrag.ghost.style.setProperty('--drag-y', (e.clientY-ddDrag.offsetY)+'px');
  setActiveDDDropTarget(findDDDropTarget(e.clientX,e.clientY));
}
function onCardDragEnd(e) {
  if(!ddDrag || e.pointerId!==ddDrag.pointerId) return;
  e.preventDefault();
  const drag=ddDrag;
  const target=drag.moved ? findDDDropTarget(e.clientX,e.clientY) : null;
  cleanupDDDrag();
  suppressDDClick=true;
  window.setTimeout(()=>{ suppressDDClick=false; }, 0);
  if(!drag.moved){
    onCardClick(drag.item, drag.cardId);
  } else if(target?.dataset?.slot){
    placeCardInSlot(drag.item, drag.cardId, target.dataset.slot);
  } else if(target?.dataset?.bank!==undefined){
    returnCardToBank(drag.item, drag.cardId);
  }
}
function onCardDragCancel() {
  cleanupDDDrag();
  suppressDDClick=true;
  window.setTimeout(()=>{ suppressDDClick=false; }, 0);
}
function cleanupDDDrag() {
  if(!ddDrag) return;
  const el=ddDrag.sourceEl;
  el.classList.remove('drag-source');
  el.removeEventListener('pointermove', onCardDragMove);
  el.removeEventListener('pointerup', onCardDragEnd);
  el.removeEventListener('pointercancel', onCardDragCancel);
  if(ddDrag.ghost) ddDrag.ghost.remove();
  document.querySelectorAll('.drop-active').forEach(node=>node.classList.remove('drop-active'));
  ddDrag=null;
}
function findDDDropTarget(x,y) {
  const ghost=ddDrag?.ghost;
  if(ghost) ghost.style.display='none';
  const el=document.elementFromPoint(x,y);
  if(ghost) ghost.style.display='';
  return el?.closest?.('[data-slot], [data-bank]') || null;
}
function setActiveDDDropTarget(target) {
  document.querySelectorAll('.drop-active').forEach(node=>node.classList.remove('drop-active'));
  if(target) target.classList.add('drop-active');
}
function autoCheckDD(item,force) { if(!currentDD||answered)return; const allPlaced=currentDD.cards.every(c=>dragState.placements[c.id]); if(!allPlaced&&!force)return; const results={}; let count=0; currentDD.cards.forEach(c=>{const ok=dragState.placements[c.id]===c.correctSlot; results[c.id]=ok; if(ok)count++;}); const all=count===currentDD.cards.length; if(allPlaced){ answered=true; mark(all,{placements:{...dragState.placements}, rowResults:results, ddSetup:JSON.parse(JSON.stringify(currentDD))}); renderDDFeedback(results); feedback((all?'Correct. ':'Not quite. ')+item.explanation, all?'good':'bad'); } }
function renderDDFeedback(results) { document.querySelectorAll('.slot-target').forEach(slot=>{ const card=slot.querySelector('.dd-card'); if(card){ const ok=!!results[card.dataset.card]; slot.classList.add(ok?'correct':'wrong'); card.classList.add(ok?'correct':'wrong'); card.disabled=true; } }); }
function mark(ok, data={}) { const item=currentQ(); states[item.id]={...(states[item.id]||{}), answered:true, correct:ok, ...data}; answered=true; document.querySelectorAll('button[onclick="showAnswer()"]').forEach(btn=>{ btn.disabled=true; btn.setAttribute('aria-disabled','true'); }); score=Object.values(states).filter(s=>s.answered&&s.correct).length; elScore.textContent=score; renderJump(); saveActiveAttempt(); }
function feedback(msg,type) { const f=document.getElementById('fb'); f.className='feedback '+type; f.textContent=msg; }
function showAnswer() {
  const item=currentQ();
  if(answered) return;
  if(item.type==='mcq'){
    document.querySelectorAll('.opt').forEach((b,k)=>{ b.disabled=true; if(item.options[item._shuf[k]].correct)b.classList.add('reveal'); });
    mark(false,{revealed:true, optionOrder:item._shuf.slice()});
  } else if(item.type==='fill'){
    const values=[];
    document.querySelectorAll('input[data-fill]').forEach(inp=>{ const s=item.sentences[+inp.dataset.fill]; inp.value=s.answers[0]; values[+inp.dataset.fill]=inp.value; inp.classList.add('correct'); inp.disabled=true; });
    mark(false,{revealed:true, values});
  } else if(item.type==='matching'){
    const values=[]; const rowResults=[];
    document.querySelectorAll('select[data-match]').forEach(sel=>{ const idx=+sel.dataset.match; sel.value=String(idx); values[idx]=idx; rowResults[idx]=true; sel.disabled=true; sel.closest('.select-row').classList.add('correct'); });
    mark(false,{revealed:true, values, rowResults, optionOrder:item._matchOptions.slice()});
  } else {
    currentDD.cards.forEach(c=>dragState.placements[c.id]=c.correctSlot);
    const results={}; currentDD.cards.forEach(c=>results[c.id]=true);
    renderDDArea(item);
    document.querySelectorAll('.slot-target').forEach(slot=>slot.classList.add('correct'));
    document.querySelectorAll('.dd-card').forEach(card=>{card.classList.add('correct'); card.disabled=true;});
    mark(false,{revealed:true, placements:{...dragState.placements}, rowResults:results, ddSetup:JSON.parse(JSON.stringify(currentDD))});
  }
  answered=true;
  feedback('Answer shown. This question is now locked for this attempt. '+item.explanation,'info');
}
function prevQ() { pos=(pos-1+order.length)%order.length; saveActiveAttempt(); renderQuestion(); }
function nextQ() { pos=(pos+1)%order.length; saveActiveAttempt(); renderQuestion(); }
function showSubmittingScreen() {
  setQuizChrome(false);
  elCard.innerHTML = `<div class="loading-screen"><div class="loading-panel"><div class="wait-orb"><div class="wait-ring ring-a"></div><div class="wait-ring ring-b"></div><div class="wait-core"></div><div class="wait-dot"></div></div><div class="loading-title">Please wait...</div><div class="loading-sub">Saving this quiz run and preparing your result summary.</div><div class="loading-mini">This will take about 5 seconds.</div></div></div>`;
}
function submitAttempt(timeExpired=false) {
  if(attemptSubmitted) return;
  attemptSubmitted=true;
  disableNavigationGuard();
  saveActiveAttempt();
  stopTimer();
  const total=order.length || BANK.length;
  const answeredCount = Object.values(states).filter(s=>s.answered).length;
  const wrongIds = order
    .map(qi => BANK[qi]?.id)
    .filter(id => states[id]?.answered && !states[id]?.correct);
  currentAttemptRecord = {
    submittedAt: new Date().toISOString(),
    score: score,
    total: total,
    answeredCount: answeredCount,
    timeExpired: !!timeExpired,
    remainingSeconds: Math.max(0, remainingSeconds),
    wrongIds: wrongIds
  };
  const best=parseInt(lsGet(STORE_PREFIX+'best')||'0',10);
  if(score>best) lsSet(STORE_PREFIX+'best', String(score));
  const completed = appendAttemptRecord(currentAttemptRecord);
  currentAttemptRecord.completedCount = completed;
  clearActiveAttempt();
  updateSavedStats();
  showSubmittingScreen();
  window.setTimeout(()=>renderResult(false, timeExpired), 5000);
}
function renderResult(recordCompletion=false, timeExpired=false) {
  stopTimer();
  setQuizChrome(false);
  elProg.style.width='100%';
  const attempt = currentAttemptRecord || {
    score: score,
    total: order.length || BANK.length,
    answeredCount: Object.values(states).filter(s=>s.answered).length,
    timeExpired: !!timeExpired,
    remainingSeconds: Math.max(0, remainingSeconds),
    completedCount: getCompleted()
  };
  const total=attempt.total;
  const pct=Math.round((attempt.score/total)*100);
  const completed=attempt.completedCount || getCompleted();
  const resultTitle = attempt.timeExpired ? 'Time is up — attempt submitted' : 'Attempt submitted';
  const timeLine = attempt.timeExpired ? 'The 40-minute timer ended, the quiz was submitted automatically, and the attempt was locked.' : `Time remaining when submitted: <strong>${formatTime(Math.max(0, attempt.remainingSeconds))}</strong>. This attempt has been locked and cannot be edited.`;
  elCard.innerHTML=`<div class="result"><h2>${resultTitle}</h2><div class="score-big">${attempt.score} / ${total}</div><p>${pct}% correct</p><p class="small">${timeLine}</p><p class="small">Answered questions counted: ${attempt.answeredCount} / ${total}. Completed attempts saved in this browser: <strong>${completed}</strong>.</p><p class="small">This locked attempt will appear on the opening page. It will stay here until you press the return button.</p><p class="small">If there are wrong marks, the opening page can generate an incorrect-question-only practice set from this latest attempt.</p><div class="actions" style="justify-content:center"><button class="btn" onclick="showOpening()">Return to opening page</button></div></div>`;
}
bootQuiz();
</script>
</body>
