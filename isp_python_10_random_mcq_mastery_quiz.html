function startIncorrectPractice() {

  }
  const wrongIndexes = wrongIds.map(id => BANK.findIndex(q => q.id === id)).filter(i => i >= 0);
  if(!wrongIndexes.length){
    showOpeningMessage("You've got no wrong mark!", 'good');
    return;
  }
  disableNavigationGuard();
  clearActiveAttempt();
  stopTimer();
  practiceMode = true;
  attemptSubmitted = false;
  currentAttemptRecord = null;
  order = wrongIndexes;
  pos = 0;
  score = 0;
  states = {};
  elScore.textContent = '0';

  setQuizChrome(true);
  elQuizBar.classList.add('hidden');
  renderJump();
  renderQuestion();
}

function renderFill_HTML(item) { return `<div class="fillbox">${item.sentences.map((s,i)=>`<label class="fill-row">${escapeHTML(s.before)}<input data-fill="${i}" autocomplete="off" autocapitalize="none" spellcheck="false" />${escapeHTML(s.after)}</label>`).join('')}</div><p class="small">Type the missing word or phrase. Correct blanks lock automatically.</p>`; }

function checkFill() {
  const item=currentQ();
  if(answered) return;
  const inputs=[...document.querySelectorAll('input[data-fill]')];
  const st = states[item.id] || {answered:false, correct:false, values:Array(item.sentences.length).fill(''), locked:Array(item.sentences.length).fill(false)};
  st.values = st.values || Array(item.sentences.length).fill('');
  st.locked = st.locked || Array(item.sentences.length).fill(false);
  let allLocked=true;
  let allFilled=true;
  inputs.forEach(inp=>{
    const idx=+inp.dataset.fill;
    if(st.locked[idx]){ inp.disabled=true; inp.classList.add('correct'); return; }
    st.values[idx]=inp.value;
    const s=item.sentences[idx];
    const ok=s.answers.some(a=>norm(a)===norm(inp.value));
    if(ok){
      st.locked[idx]=true;
      inp.classList.add('correct');
      inp.disabled=true;
    } else {
      inp.classList.remove('correct');
    }
    if(!st.locked[idx]) allLocked=false;
    if(!inp.value.trim()) allFilled=false;
  });
  states[item.id]=st;
  saveActiveAttempt();
  if(st.locked.every(Boolean)){
    answered=true;
    mark(true,{values:st.values.slice(), locked:st.locked.slice()});

}

function attachSelectMatch(item) {

function checkSelectMatch() {
  const item=currentQ();

  const selects=[...document.querySelectorAll('select[data-match]')];
  const allChosen=selects.every(s=>s.value!=='');

  let allCorrect=true;
  const values=[];

  selects.forEach(sel=>{
    const row=sel.closest('.select-row');
    const termIndex=+sel.dataset.match;

    const ok=termIndex===chosenIndex;
    values[termIndex]=chosenIndex;
    rowResults[termIndex]=ok;
    row.classList.add(ok?'correct':'wrong');
    if(!ok) allCorrect=false;
    sel.disabled=true;
  });

function setupDD(item) {

  return {cards,slots,slotOrder,cardOrder:shuffle(cards.map(c=>c.id)),type:item.type};
}
function renderDD_HTML(item) { currentDD=setupDD(item); const st=states[item.id]; if(st?.placements) dragState.placements={...st.placements}; const hint=item.type==='matching'?'Tap a card, then tap its matching slot. Tap a placed card to return it.':'Tap a card, then tap the correct numbered step. Tap a placed card to return it.'; return `<div class="dd-hint">🌿 ${hint}</div><div id="ddArea"></div>`; }
function attachDD(item) { renderDDArea(item); const st=states[item.id]; if(st?.answered){ renderDDFeedback(st.rowResults || {}); document.querySelectorAll('.dd-card').forEach(card=>card.disabled=true); } }
function renderDDArea(item) { const area=document.getElementById('ddArea'); let h=''; if(currentDD.type==='matching') h+=renderMatchSlots(); else h+=renderOrderSlots(); const inBank=currentDD.cardOrder.filter(cid=>!dragState.placements[cid]); h+=`<div class="card-bank"><div class="card-bank-label">Cards (${inBank.length} left)</div><div class="card-bank-cards">${inBank.length?inBank.map(cid=>{const c=currentDD.cards.find(x=>x.id===cid); const sel=dragState.selected===cid?' selected':''; return `<button class="dd-card${sel}" data-card="${cid}">${escapeHTML(c.text)}</button>`;}).join(''):'<span class="small">All placed.</span>'}</div></div>`; area.innerHTML=h; area.querySelectorAll('.dd-card').forEach(el=>{el.onclick=e=>{e.stopPropagation(); onCardClick(item,el.dataset.card);}}); area.querySelectorAll('[data-slot]').forEach(el=>{el.onclick=()=>onSlotClick(item,el.dataset.slot);}); autoCheckDD(item,false); }
function renderMatchSlots() { return `<div class="match-list">${currentDD.slotOrder.map(sid=>{const slot=currentDD.slots.find(s=>s.id===sid); return `<div class="match-row"><div class="match-label">${escapeHTML(slot.label)}</div>${slotHTML(sid)}</div>`;}).join('')}</div>`; }
function renderOrderSlots() { return `<div class="order-list">${currentDD.slotOrder.map(sid=>{const slot=currentDD.slots.find(s=>s.id===sid); return `<div class="order-row"><div class="order-num">${slot.label}</div>${slotHTML(sid)}</div>`;}).join('')}</div>`; }
function slotHTML(sid) { const cardId=Object.keys(dragState.placements).find(cid=>dragState.placements[cid]===sid); if(cardId){const c=currentDD.cards.find(x=>x.id===cardId); return `<div class="slot-target has-card" data-slot="${sid}"><button class="dd-card" data-card="${cardId}">${escapeHTML(c.text)}</button></div>`;} return `<div class="slot-target" data-slot="${sid}"><span class="placeholder">tap to place</span></div>`; }
function onCardClick(item,cardId) { if(answered)return; if(dragState.placements[cardId]){ delete dragState.placements[cardId]; dragState.selected=null; } else { dragState.selected=(dragState.selected===cardId)?null:cardId; } renderDDArea(item); saveActiveAttempt(); }
function onSlotClick(item,slotId) { if(answered||!dragState.selected)return; Object.keys(dragState.placements).forEach(cid=>{if(dragState.placements[cid]===slotId)delete dragState.placements[cid];}); dragState.placements[dragState.selected]=slotId; dragState.selected=null; renderDDArea(item); saveActiveAttempt(); }
function autoCheckDD(item,force) { if(!currentDD||answered)return; const allPlaced=currentDD.cards.every(c=>dragState.placements[c.id]); if(!allPlaced&&!force)return; const results={}; let count=0; currentDD.cards.forEach(c=>{const ok=dragState.placements[c.id]===c.correctSlot; results[c.id]=ok; if(ok)count++;}); const all=count===currentDD.cards.length; if(allPlaced){ answered=true; mark(all,{placements:{...dragState.placements}, rowResults:results, ddSetup:JSON.parse(JSON.stringify(currentDD))}); renderDDFeedback(results); feedback((all?'Correct. ':'Not quite. ')+item.explanation, all?'good':'bad'); } }
function renderDDFeedback(results) { document.querySelectorAll('.slot-target').forEach(slot=>{ const card=slot.querySelector('.dd-card'); if(card){ const ok=!!results[card.dataset.card]; slot.classList.add(ok?'correct':'wrong'); card.classList.add(ok?'correct':'wrong'); card.disabled=true; } }); }
function mark(ok, data={}) { const item=currentQ(); states[item.id]={...(states[item.id]||{}), answered:true, correct:ok, ...data}; answered=true; document.querySelectorAll('button[onclick="showAnswer()"]').forEach(btn=>{ btn.disabled=true; btn.setAttribute('aria-disabled','true'); }); score=Object.values(states).filter(s=>s.answered&&s.correct).length; elScore.textContent=score; renderJump(); saveActiveAttempt(); }
function feedback(msg,type) { const f=document.getElementById('fb'); f.className='feedback '+type; f.textContent=msg; }
function showAnswer() {
  const item=currentQ();
  if(answered) return;
  if(item.type==='mcq'){
    document.querySelectorAll('.opt').forEach((b,k)=>{ b.disabled=true; if(item.options[item._shuf[k]].correct)b.classList.add('reveal'); });
    mark(false,{revealed:true, optionOrder:item._shuf.slice()});
  } else if(item.type==='fill'){
    const values=[];
    document.querySelectorAll('input[data-fill]').forEach(inp=>{ const s=item.sentences[+inp.dataset.fill]; inp.value=s.answers[0]; values[+inp.dataset.fill]=inp.value; inp.classList.add('correct'); inp.disabled=true; });
    mark(false,{revealed:true, values});
  } else if(item.type==='matching'){
    const values=[]; const rowResults=[];
    document.querySelectorAll('select[data-match]').forEach(sel=>{ const idx=+sel.dataset.match; sel.value=String(idx); values[idx]=idx; rowResults[idx]=true; sel.disabled=true; sel.closest('.select-row').classList.add('correct'); });
    mark(false,{revealed:true, values, rowResults, optionOrder:item._matchOptions.slice()});
  } else {
    currentDD.cards.forEach(c=>dragState.placements[c.id]=c.correctSlot);
    const results={}; currentDD.cards.forEach(c=>results[c.id]=true);
    renderDDArea(item);
    document.querySelectorAll('.slot-target').forEach(slot=>slot.classList.add('correct'));
    document.querySelectorAll('.dd-card').forEach(card=>{card.classList.add('correct'); card.disabled=true;});
    mark(false,{revealed:true, placements:{...dragState.placements}, rowResults:results, ddSetup:JSON.parse(JSON.stringify(currentDD))});
  }
  answered=true;
  feedback('Answer shown. This question is now locked for this attempt. '+item.explanation,'info');
}
function prevQ() { pos=(pos-1+order.length)%order.length; saveActiveAttempt(); renderQuestion(); }
function nextQ() { pos=(pos+1)%order.length; saveActiveAttempt(); renderQuestion(); }
function showSubmittingScreen() {
  setQuizChrome(false);
  elCard.innerHTML = `<div class="loading-screen"><div class="loading-panel"><div class="wait-orb"><div class="wait-ring ring-a"></div><div class="wait-ring ring-b"></div><div class="wait-core"></div><div class="wait-dot"></div></div><div class="loading-title">Please wait...</div><div class="loading-sub">Submitting your quiz and saving this completion record in the browser.</div><div class="loading-mini">This will take about 5 seconds.</div></div></div>`;
}
function submitAttempt(timeExpired=false) {
  if(attemptSubmitted) return;
  attemptSubmitted=true;
  disableNavigationGuard();
  saveActiveAttempt();
  stopTimer();
  const total=order.length || BANK.length;
  const answeredCount = Object.values(states).filter(s=>s.answered).length;
  const wrongIds = order
    .map(qi => BANK[qi]?.id)
    .filter(id => states[id]?.answered && !states[id]?.correct);
  currentAttemptRecord = {
    submittedAt: new Date().toISOString(),
    score: score,
    total: total,
    answeredCount: answeredCount,
    timeExpired: !!timeExpired,
    remainingSeconds: Math.max(0, remainingSeconds),
    wrongIds: wrongIds
  };
  const best=parseInt(lsGet(STORE_PREFIX+'best')||'0',10);
  if(score>best) lsSet(STORE_PREFIX+'best', String(score));
  const completed = appendAttemptRecord(currentAttemptRecord);
  currentAttemptRecord.completedCount = completed;
  clearActiveAttempt();
  updateSavedStats();
  showSubmittingScreen();
  window.setTimeout(()=>renderResult(false, timeExpired), 5000);
}
function renderResult(recordCompletion=false, timeExpired=false) {
  stopTimer();
  setQuizChrome(false);
  elProg.style.width='100%';
  const attempt = currentAttemptRecord || {
    score: score,
    total: order.length || BANK.length,
    answeredCount: Object.values(states).filter(s=>s.answered).length,
    timeExpired: !!timeExpired,
    remainingSeconds: Math.max(0, remainingSeconds),
    completedCount: getCompleted()
  };
  const total=attempt.total;
  const pct=Math.round((attempt.score/total)*100);
  const completed=attempt.completedCount || getCompleted();
  const resultTitle = attempt.timeExpired ? 'Time is up — attempt submitted' : 'Attempt submitted';
  const timeLine = attempt.timeExpired ? 'The 15-minute timer ended, the quiz was submitted automatically, and the attempt was locked.' : `Time remaining when submitted: <strong>${formatTime(Math.max(0, attempt.remainingSeconds))}</strong>. This attempt has been locked and cannot be edited.`;
  elCard.innerHTML=`<div class="result"><h2>${resultTitle}</h2><div class="score-big">${attempt.score} / ${total}</div><p>${pct}% correct</p><p class="small">${timeLine}</p><p class="small">Answered questions counted: ${attempt.answeredCount} / ${total}. Completed attempts saved in this browser: <strong>${completed}</strong>.</p><p class="small">This locked attempt will appear on the opening page. It will stay here until you press the return button.</p><p class="small">If there are wrong marks, the opening page can generate an incorrect-question-only practice set from this latest attempt.</p><div class="actions" style="justify-content:center"><button class="btn" onclick="showOpening()">Return to opening page</button></div></div>`;
}
bootQuiz();
</script>
